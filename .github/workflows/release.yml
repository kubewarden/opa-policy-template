on:
  push:
    branches:
      - main
    tags:
      - "v*"

name: Release policy

jobs:
  test:
    name: run tests and linters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install opa
        uses: kubewarden/github-actions/opa-installer@a03315e95ccf85c92e5d472824edeab0704f857b # v4.6.1
      - name: Run unit tests
        run: make test

  release:
    needs: test
    permissions:
      # Required to create GH releases
      contents: write
      # Required to push to GHCR
      packages: write
      # Required by cosign keyless signing
      id-token: write

    runs-on: ubuntu-latest
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0
      - name: Install kwctl
        uses: kubewarden/github-actions/kwctl-installer@a03315e95ccf85c92e5d472824edeab0704f857b # v4.6.1
      - name: Install bats
        run: sudo apt install -y bats
      - name: Install SBOM generator tool
        uses: kubewarden/github-actions/syft-installer@a03315e95ccf85c92e5d472824edeab0704f857b # v4.6.1
      - name: Install binaryen tool
        uses: kubewarden/github-actions/binaryen-installer@a03315e95ccf85c92e5d472824edeab0704f857b # v4.6.1
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # until https://github.com/actions/checkout/pull/579 is released
          fetch-depth: 0
      - id: calculate-version
        shell: bash
        run: |
          if [ ${{ startsWith(github.ref, 'refs/tags/v') }} == true ]; then
            # Triggered via normal tag.
            # Use the latest tag (e.g: v0.1.11) without the `v` prefix.
            version=$(git describe --tags --abbrev=0 | cut -c2-)
          else
            # Triggered via branch, version is not checked in artifacthub.
            # Still, `make artifacthub-pkg.yml` needs a proper semver string.
            if [ $(git describe --tags) ]; then
              # Tag exists, use most recent tag with the number of additional
              # commits on top of the tagged object & last commit hash (eg.
              # v0.1.11-3-g8a36322), without the `v` prefix.
              version=$(git describe --tags | cut -c2-)
            else
              # Tag doesn't exist, provide bogus version
              version="0.0.0-$(git describe --always)-unreleased"
            fi
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
      - name: Check that `io.kubewarden.policy.version` annotation is up-to-date
        # skip when releasing :latest from main, versions will not match
        if: startsWith(github.ref, 'refs/tags/v')
        uses: kubewarden/github-actions/check-policy-version@a03315e95ccf85c92e5d472824edeab0704f857b # v4.6.1
        with:
          expected-version: ${{ steps.calculate-version.outputs.version }}
      - name: Install opa
        uses: kubewarden/github-actions/opa-installer@a03315e95ccf85c92e5d472824edeab0704f857b # v4.6.1
      - name: Build policy
        run: make policy.wasm
      - name: Annotate policy
        run: make annotated-policy.wasm
      - name: Run e2e tests
        run: make e2e-tests
      - name: Release
        uses: kubewarden/github-actions/policy-release@a03315e95ccf85c92e5d472824edeab0704f857b # v4.6.1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          oci-target: ghcr.io/${{ github.repository_owner }}/policies/policy-name # FIXME
          policy-version: ${{ steps.calculate-version.outputs.version }}
          expect-sbom: "false"

  push-artifacthub:
    # only run when triggered by a tag, not a branch push
    if: ${{ ! startsWith(github.ref, 'refs/heads/') }}
    needs: release
    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the
      # added or changed files to the repository.
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Install kwctl
        uses: kubewarden/github-actions/kwctl-installer@a03315e95ccf85c92e5d472824edeab0704f857b # v4.6.1
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # fetch all history for all branches and tags
      - name: generate artifacthub-pkg.yml
        run: kwctl scaffold artifacthub --output ${{ runner.temp }}/artifacthub-pkg.yml
      - name: Push up-to-date artifacthub-pkg.yml
        run: |
          set -x
          git config user.name "Update artifacthub branch"
          git config user.email github-actions@github.com

          git checkout -b main --track origin/main
          git checkout -b artifacthub --track origin/artifacthub || git checkout --orphan artifacthub
          git reset HEAD -- .

          # checkout the specific files we need from the specific tag that triggered this workflow:
          git checkout ${{ github.ref_name }} -- artifacthub-repo.yml
          mv ${{ runner.temp }}/artifacthub-pkg.yml artifacthub-pkg.yml
          git checkout ${{ github.ref_name }} -- README.md

          # add and commit the needed files:
          git add artifacthub-pkg.yml
          git add artifacthub-repo.yml
          git add README.md # used if artifacthub-pkg.yml.readme is missing
          VERSION=$(sed --posix -n 's,^version: \(.*\),\1,p' artifacthub-pkg.yml)
          git commit -m "Bump ArtifactHub files, version $VERSION"

          git push origin artifacthub
